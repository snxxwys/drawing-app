<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0f0f0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Draw Together</title>
  <link rel="manifest" href="/manifest.json" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f0f; --surface: #181818; --border: #2a2a2a;
      --text: #e8e8e8; --dim: #555; --accent: #e8ff47; --danger: #ff4747;
    }
    html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; touch-action: none; }

    /* SETUP */
    #setup {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 24px; padding: 32px; z-index: 10;
    }
    #setup h1 { font-family: 'Syne', sans-serif; font-size: clamp(2.5rem,10vw,4rem); font-weight: 800; color: var(--accent); letter-spacing: -0.03em; line-height: 1; text-align: center; }
    #setup p { color: var(--dim); font-size: 0.75rem; text-align: center; }
    .field { display: flex; flex-direction: column; gap: 6px; width: 100%; max-width: 320px; }
    .field label { font-size: 0.6rem; letter-spacing: 0.12em; color: var(--dim); text-transform: uppercase; }
    input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 13px 16px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.9rem; outline: none; }
    input:focus { border-color: var(--accent); }
    input::placeholder { color: var(--dim); }
    #connect-btn { width: 100%; max-width: 320px; padding: 15px; background: var(--accent); color: #0f0f0f; border: none; border-radius: 10px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem; cursor: pointer; }
    #connect-btn:active { opacity: 0.85; }

    /* WAKE OVERLAY */
    #wake {
      position: fixed; inset: 0; display: none; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
      background: var(--bg); z-index: 9;
    }
    #wake.show { display: flex; }
    .spinner { width: 30px; height: 30px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #wake h2 { font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; }
    #wake p { font-size: 0.7rem; color: var(--dim); text-align: center; max-width: 240px; line-height: 1.6; }
    #wake-secs { font-size: 0.65rem; color: var(--accent); }

    /* APP */
    #app { display: none; flex-direction: column; height: 100%; }
    #app.show { display: flex; }

    /* TOPBAR */
    #topbar { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
    #room-label { font-size: 0.65rem; letter-spacing: 0.1em; color: var(--dim); }
    #status { display: flex; align-items: center; gap: 6px; }
    #status-txt { font-size: 0.6rem; color: var(--dim); }
    #dot { width: 7px; height: 7px; border-radius: 50%; background: var(--dim); transition: background 0.3s; }
    #dot.live { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
    #dot.err { background: var(--danger); }

    /* TOOLBAR */
    #toolbar { display: flex; align-items: center; gap: 8px; padding: 10px 14px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; overflow-x: auto; scrollbar-width: none; }
    #toolbar::-webkit-scrollbar { display: none; }
    .swatch { width: 26px; height: 26px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; flex-shrink: 0; transition: transform 0.15s; }
    .swatch.on { border-color: #fff; transform: scale(1.2); }
    .sep { width: 1px; height: 22px; background: var(--border); flex-shrink: 0; }
    #size-label { font-size: 0.6rem; color: var(--dim); flex-shrink: 0; }
    #brush { -webkit-appearance: none; appearance: none; width: 80px; height: 4px; background: var(--border); border-radius: 2px; outline: none; flex-shrink: 0; }
    #brush::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: var(--accent); cursor: pointer; }
    #clear-btn { margin-left: auto; padding: 5px 12px; background: transparent; border: 1px solid var(--border); border-radius: 7px; color: var(--dim); font-family: 'DM Mono', monospace; font-size: 0.65rem; cursor: pointer; flex-shrink: 0; }
    #clear-btn:hover { border-color: var(--danger); color: var(--danger); }

    /* CANVAS */
    #canvas-wrap { flex: 1; position: relative; overflow: hidden; }
    canvas { position: absolute; inset: 0; width: 100%; height: 100%; touch-action: none; cursor: crosshair; }
    #c-theirs { z-index: 1; }
    #c-mine   { z-index: 2; }
  </style>
</head>
<body>

<div id="setup">
  <h1>draw<br>together</h1>
  <p>Connect to your shared room.</p>
  <div class="field">
    <label>Server URL</label>
    <input id="url-input" type="text" placeholder="wss://your-app.onrender.com" autocomplete="off" autocorrect="off" />
  </div>
  <div class="field">
    <label>Room ID</label>
    <input id="room-input" type="text" placeholder="us" autocomplete="off" autocorrect="off" />
  </div>
  <button id="connect-btn">Connect →</button>
</div>

<div id="wake">
  <div class="spinner"></div>
  <h2>Waking up server…</h2>
  <p>Render's free tier sleeps when idle. Give it up to 50 seconds.</p>
  <div id="wake-secs">0s</div>
</div>

<div id="app">
  <div id="topbar">
    <span id="room-label">room: —</span>
    <div id="status">
      <span id="status-txt">connecting</span>
      <div id="dot"></div>
    </div>
  </div>
  <div id="toolbar">
    <div class="swatch on" data-color="#e8ff47" style="background:#e8ff47"></div>
    <div class="swatch" data-color="#ff4f4f" style="background:#ff4f4f"></div>
    <div class="swatch" data-color="#4faaff" style="background:#4faaff"></div>
    <div class="swatch" data-color="#4fffb0" style="background:#4fffb0"></div>
    <div class="swatch" data-color="#ff9f4f" style="background:#ff9f4f"></div>
    <div class="swatch" data-color="#cc7fff" style="background:#cc7fff"></div>
    <div class="swatch" data-color="#ffffff" style="background:#ffffff"></div>
    <div class="sep"></div>
    <span id="size-label">SIZE</span>
    <input type="range" id="brush" min="2" max="32" value="6" />
    <button id="clear-btn">CLEAR</button>
  </div>
  <div id="canvas-wrap">
    <canvas id="c-theirs"></canvas>
    <canvas id="c-mine"></canvas>
  </div>
</div>

<script>
// ── ELEMENTS ──
const setup   = document.getElementById("setup");
const wakeEl  = document.getElementById("wake");
const app     = document.getElementById("app");
const cMine   = document.getElementById("c-mine");
const cTheirs = document.getElementById("c-theirs");
const ctxM    = cMine.getContext("2d");
const ctxT    = cTheirs.getContext("2d");

// ── STATE ──
let ws         = null;
let wsUrl      = "";
let drawing    = false;
let lastX      = 0, lastY = 0;
let color      = "#e8ff47";
let brushSize  = 6;
let lastSend   = 0;
let firstConn  = true;
let wakeTimer  = null;
let wakeSecs   = 0;
const THROTTLE = 16;

// ── CANVAS RESIZE ──
function resize() {
  const wrap = document.getElementById("canvas-wrap");
  const w = wrap.clientWidth, h = wrap.clientHeight;
  for (const c of [cMine, cTheirs]) {
    // Save content
    const tmp = document.createElement("canvas");
    tmp.width = c.width; tmp.height = c.height;
    tmp.getContext("2d").drawImage(c, 0, 0);
    c.width = w; c.height = h;
    c.getContext("2d").drawImage(tmp, 0, 0);
  }
}
window.addEventListener("resize", resize);

// ── CONNECT ──
document.getElementById("connect-btn").addEventListener("click", () => {
  const raw = document.getElementById("url-input").value.trim();
  const room = document.getElementById("room-input").value.trim() || "default";
  if (!raw) { alert("Enter a server URL"); return; }

  // Auto-fix http -> ws protocol
  wsUrl = raw.replace(/^http:/, "ws:").replace(/^https:/, "wss:");
  if (!wsUrl.startsWith("ws")) wsUrl = "wss://" + wsUrl;
  wsUrl += (wsUrl.includes("?") ? "&" : "?") + "room=" + encodeURIComponent(room);

  setup.style.display = "none";
  app.classList.add("show");
  document.getElementById("room-label").textContent = "room: " + room;

  setTimeout(() => { resize(); openWS(); }, 50);
});

// ── WEBSOCKET ──
function openWS() {
  setStatus("connecting");
  if (firstConn) startWake();

  ws = new WebSocket(wsUrl);

  ws.onopen = () => {
    console.log("WS open");
    firstConn = false;
    stopWake();
    setStatus("live");
  };

  ws.onmessage = async (e) => {
    stopWake();
    firstConn = false;
    try {
      const text = e.data instanceof Blob ? await e.data.text() : e.data;
      const msg = JSON.parse(text);
      console.log("recv:", msg.type);
      if (msg.type === "draw") {
        stroke(ctxT,
          msg.x0 * cTheirs.width,
          msg.y0 * cTheirs.height,
          msg.x1 * cTheirs.width,
          msg.y1 * cTheirs.height,
          msg.color, msg.size
        );
      } else if (msg.type === "clear") {
        ctxT.clearRect(0, 0, cTheirs.width, cTheirs.height);
      }
    } catch(err) { console.error("parse err", err); }
  };

  ws.onclose = (e) => {
    console.log("WS closed", e.code, e.reason);
    setStatus("disconnected");
    setTimeout(openWS, 3000);
  };

  ws.onerror = (e) => {
    console.error("WS error", e);
    setStatus("error");
  };
}

function send(obj) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(obj));
  }
}

// ── DRAWING ──
function stroke(ctx, x0, y0, x1, y1, col, size) {
  ctx.beginPath();
  ctx.moveTo(x0, y0);
  ctx.lineTo(x1, y1);
  ctx.strokeStyle = col;
  ctx.lineWidth = size;
  ctx.lineCap = "round";
  ctx.lineJoin = "round";
  ctx.stroke();
}

function pos(e) {
  const r = cMine.getBoundingClientRect();
  const src = e.touches ? e.touches[0] : e;
  return {
    x: (src.clientX - r.left) * (cMine.width / r.width),
    y: (src.clientY - r.top)  * (cMine.height / r.height)
  };
}

cMine.addEventListener("mousedown",  e => { drawing = true;  const p = pos(e); lastX = p.x; lastY = p.y; });
cMine.addEventListener("mousemove",  e => { if (!drawing) return; draw(e); });
cMine.addEventListener("mouseup",    () => { drawing = false; });
cMine.addEventListener("mouseleave", () => { drawing = false; });
cMine.addEventListener("touchstart", e => { e.preventDefault(); drawing = true;  const p = pos(e); lastX = p.x; lastY = p.y; }, { passive: false });
cMine.addEventListener("touchmove",  e => { e.preventDefault(); if (!drawing) return; draw(e); }, { passive: false });
cMine.addEventListener("touchend",   e => { e.preventDefault(); drawing = false; }, { passive: false });

function draw(e) {
  const { x, y } = pos(e);
  stroke(ctxM, lastX, lastY, x, y, color, brushSize);

  const now = Date.now();
  if (now - lastSend >= THROTTLE) {
    send({
      type: "draw",
      x0: lastX / cMine.width,
      y0: lastY / cMine.height,
      x1: x     / cMine.width,
      y1: y     / cMine.height,
      color, size: brushSize
    });
    lastSend = now;
  }

  lastX = x; lastY = y;
}

// ── CLEAR ──
document.getElementById("clear-btn").addEventListener("click", () => {
  ctxM.clearRect(0, 0, cMine.width, cMine.height);
  send({ type: "clear" });
});

// ── TOOLBAR ──
document.querySelectorAll(".swatch").forEach(s => {
  s.addEventListener("click", () => {
    document.querySelectorAll(".swatch").forEach(x => x.classList.remove("on"));
    s.classList.add("on");
    color = s.dataset.color;
  });
});
document.getElementById("brush").addEventListener("input", e => {
  brushSize = +e.target.value;
});

// ── STATUS ──
function setStatus(state) {
  const dot = document.getElementById("dot");
  const txt = document.getElementById("status-txt");
  dot.className = "";
  if (state === "live")  { dot.classList.add("live"); txt.textContent = "live"; }
  else if (state === "error") { dot.classList.add("err"); txt.textContent = "error"; }
  else { txt.textContent = state; }
}

// ── WAKE OVERLAY ──
function startWake() {
  wakeEl.classList.add("show");
  wakeSecs = 0;
  clearInterval(wakeTimer);
  wakeTimer = setInterval(() => {
    document.getElementById("wake-secs").textContent = ++wakeSecs + "s";
  }, 1000);
}
function stopWake() {
  wakeEl.classList.remove("show");
  clearInterval(wakeTimer);
}

// ── SERVICE WORKER ──
if ("serviceWorker" in navigator) navigator.serviceWorker.register("/sw.js").catch(() => {});
</script>
</body>
</html>
